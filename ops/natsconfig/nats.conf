# Aegis Core local NATS server.
#
# Dev (macOS): TCP listener on 127.0.0.1:4222.
# Prod (Jetson): replace the `listen:` line with
#   listen: "unix:///tmp/aegis-nats.sock"
# for sub-millisecond IPC between services on a single host. The unix-socket
# form replaces TCP — pick one. The Python bus wrapper accepts both forms.

server_name: "aegis-core"
listen: "127.0.0.1:4222"

# Limits — this is a single-host bus, not a federated cluster.
max_connections: 64
max_payload: 1MB
max_pending: 16MB

# Logging
debug: false
trace: false
logtime: true
log_size_limit: 10MB

# Persistence — we use JetStream for replayable streams of senses + interventions.
jetstream {
  store_dir: "/tmp/aegis-jetstream"
  max_mem: 64MB
  max_file: 1GB
}
