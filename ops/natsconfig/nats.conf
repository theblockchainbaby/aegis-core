# Aegis Core local NATS server.
# Listens on a Unix domain socket for sub-millisecond IPC between services.
# No TCP listener on production Jetson; macOS dev uses the default 4222.

server_name: "aegis-core"
listen: "127.0.0.1:4222"           # dev only; remove on Jetson deploy
unix_socket: "/tmp/aegis-nats.sock"

# Limits — this is a single-host bus, not a federated cluster.
max_connections: 64
max_payload: 1MB
max_pending: 16MB

# Logging
debug: false
trace: false
logtime: true
log_size_limit: 10MB

# Persistence — we use JetStream for replayable streams of senses + interventions.
jetstream {
  store_dir: "/tmp/aegis-jetstream"
  max_mem: 64MB
  max_file: 1GB
}
